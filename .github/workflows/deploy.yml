name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/zicazimapcmc/Zica-zima-Website-
            # Move local backup files that block git pull
            for f in .env.server.bak package.json.bak package-lock.json.bak; do
              if [ -e "$f" ] && ! git ls-files --error-unmatch "$f" >/dev/null 2>&1; then
                mv "$f" "${f}.old"
              fi
            done
            ./deploy.sh